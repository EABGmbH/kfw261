name: Update Interhyp Rate

on:
  workflow_dispatch:
  schedule:
    - cron: '20 7 * * *'
    - cron: '20 8 * * *'

permissions:
  contents: write

jobs:
  update-interhyp:
    runs-on: ubuntu-latest
    steps:
      - name: Run only at 09:20 Europe/Berlin
        run: |
          NOW=$(TZ=Europe/Berlin date +"%H:%M")
          if [ "$NOW" != "09:20" ]; then
            echo "Skip run at $NOW Europe/Berlin"
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Interhyp
        run: npm run market:interhyp

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/market/interhyp_10y_ltv_gt90.json; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git add data/market/interhyp_10y_ltv_gt90.json
          git commit -m "chore(data): update interhyp rate"
          git pull --rebase origin main
          git push origin HEAD:main
