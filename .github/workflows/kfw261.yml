name: Update KfW 261 Rates

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  update-kfw-261:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch KfW 261
        run: npm run kfw:261

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/kfw/261.json; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git add data/kfw/261.json
          git commit -m "chore(data): update kfw 261 rates"
          git pull --rebase origin main
          git push origin HEAD:main
