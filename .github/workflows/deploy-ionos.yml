name: Deploy Website to IONOS

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via SFTP (IONOS)
        env:
          IONOS_HOST: ${{ secrets.IONOS_FTP_SERVER }}
          IONOS_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          IONOS_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          IONOS_DIR: ${{ secrets.IONOS_FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          PRIMARY_DIR="${IONOS_DIR:-/wordpress/software/kfw261}"
          PRIMARY_DIR="${PRIMARY_DIR%/}/"

          lftp -u "$IONOS_USER","$IONOS_PASS" "sftp://$IONOS_HOST:22" <<EOF
          set cmd:fail-exit yes
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 20
          set xfer:clobber on

          mkdir -p "$PRIMARY_DIR"
          mirror -R --delete --verbose \
            --exclude-glob .git* \
            --exclude-glob .github \
            --exclude-glob node_modules \
            --exclude-glob scripts \
            --exclude-glob package.json \
            --exclude-glob package-lock.json \
            --exclude-glob tsconfig.json \
            --exclude-glob README.md \
            ./ "$PRIMARY_DIR"

          cls -1 "$PRIMARY_DIR"
          bye
          EOF
